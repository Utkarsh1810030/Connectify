version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: connectify
      POSTGRES_PASSWORD: connectify_dev
      POSTGRES_DB: connectify
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U connectify']
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: 'no'
    command: >
      mongosh --host mongo:27017 --eval
      "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }) }"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://connectify:connectify_dev@postgres:5432/connectify
      MONGODB_URI: mongodb://mongo:27017/connectify?replicaSet=rs0
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_min_32_chars_long
      JWT_REFRESH_SECRET: dev_refresh_secret_min_32_chars_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      AGORA_APP_ID: ${AGORA_APP_ID:-placeholder}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-placeholder}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-placeholder}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-placeholder}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID:-placeholder}
      PLATFORM_COMMISSION_RATE: '0.15'
      MIN_WALLET_BALANCE_WARNING: '30'
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

volumes:
  postgres_data:
  mongo_data:
  redis_data:
